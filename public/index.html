<!DOCTYPE html>
<html>
<head>
    <title>WebSocket Chat Rooms</title>
    <style>
        body {
            font-family: Arial;
            background: #1e1e2f;
            color: #eee;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        #loginModal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #loginModalContent {
            background: #2a2a3f;
            padding: 20px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 280px;
        }

        input, button {
            padding: 10px;
            border-radius: 6px;
            border: none;
            outline: none;
        }

        button {
            background: #4a90e2;
            color: white;
            cursor: pointer;
        }

        #chat {
            display: none;
            width: 450px;
            background: #2a2a3f;
            padding: 15px;
            border-radius: 10px;
            flex-direction: column;
            gap: 10px;
        }

        #messages {
            height: 250px;
            overflow-y: auto;
            background: #1b1b2b;
            padding: 10px;
            border-radius: 8px;
        }

        .system { color: gray; font-style: italic; }
    </style>
</head>
<input id="pass" type="password" placeholder="password">
<button onclick="login()">Login</button>
<button onclick="register()">Register</button>
</div>

<div id="chat">
<input id="room" placeholder="room">
<button onclick="joinRoom()">Join</button>
<div id="messages"></div>
<input id="msg">
<button onclick="send()">Send</button>
</div>

<script>
let token, ws;

async function login() {
  const username = user.value;
  const password = pass.value;

  const res = await fetch('/login', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ username, password })
  });

  const data = await res.json();
  if (!res.ok) return alert(data.error);

  token = data.token;
  start();
}

async function register() {
  await fetch('/register', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ username:user.value, password:pass.value })
  });
  alert('Registered, now login');
}

function start() {
  login.style.display='none';
  chat.style.display='flex';

  ws = new WebSocket(`ws://${location.host}`);

  ws.onopen = () => {
    ws.send(JSON.stringify({ type:'auth', token }));
  };

  ws.onmessage = e => {
    const msg = JSON.parse(e.data);

    if (msg.type === 'history') {
      messages.innerHTML='';
      msg.messages.forEach(addMsg);
    }

    if (msg.type === 'chat') addMsg(msg);
    if (msg.type === 'system') addMsg(msg);
  };

  ws.onclose = () => setTimeout(start, 2000);
}

function addMsg(m) {
  const div = document.createElement('div');
  div.textContent = m.username ? `${m.username}: ${m.text}` : m.text;
  messages.appendChild(div);
}

function send() {
  if (!msg.value) return;
  ws.send(JSON.stringify({ type:'chat', text: msg.value }));
  msg.value='';
}

function joinRoom() {
  if (!room.value) return;
  ws.send(JSON.stringify({ type:'join_room', room: room.value }));
}
</script>
</body>
</html>
