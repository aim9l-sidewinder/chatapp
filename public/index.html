<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chat</title>
<style>
body {
  font-family: Arial;
  background:#1e1e2f;
  color:#eee;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}

#app {
  width:420px;
  background:#2a2a3f;
  padding:15px;
  border-radius:10px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

#messages {
  height:260px;
  overflow-y:auto;
  background:#111;
  padding:10px;
  border-radius:8px;
}

input, button {
  padding:10px;
  border:none;
  border-radius:6px;
}

button {
  background:#4a90e2;
  color:white;
  cursor:pointer;
}

.row { display:flex; gap:5px; }
.system { color:gray; font-style:italic; }
.hidden { display:none; }
</style>
</head>
<body>

<div id="app">

  <!-- LOGIN -->
  <div id="loginView">
    <h3>Login</h3>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <div class="row">
      <button id="loginBtn">Login</button>
      <button id="registerBtn">Register</button>
    </div>
    <div id="error" style="color:red;font-size:12px;"></div>
  </div>

  <!-- CHAT -->
  <div id="chatView" class="hidden">
    <div class="row">
      <input id="roomInput" placeholder="Room">
      <button id="joinBtn">Join</button>
    </div>

    <div id="messages"></div>
</html>
