// ============================
// FRONTEND (public/index.html)
// ============================

/*
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chat</title>
<style>
body {
  font-family: Arial;
  background:#1e1e2f;
  color:#eee;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}

#app {
  width:420px;
  background:#2a2a3f;
  padding:15px;
  border-radius:10px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

#messages {
  height:260px;
  overflow-y:auto;
  background:#111;
  padding:10px;
  border-radius:8px;
}

input, button {
  padding:10px;
  border:none;
  border-radius:6px;
}

button {
  background:#4a90e2;
  color:white;
  cursor:pointer;
}

.row { display:flex; gap:5px; }
.system { color:gray; font-style:italic; }
.hidden { display:none; }
</style>
</head>
<body>

<div id="app">

  <!-- LOGIN -->
  <div id="loginView">
    <h3>Login</h3>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <div class="row">
      <button id="loginBtn">Login</button>
      <button id="registerBtn">Register</button>
    </div>
    <div id="error" style="color:red;font-size:12px;"></div>
  </div>

  <!-- CHAT -->
  <div id="chatView" class="hidden">
    <div class="row">
      <input id="roomInput" placeholder="Room">
      <button id="joinBtn">Join</button>
    </div>

    <div id="messages"></div>

    <div class="row">
      <input id="messageInput" placeholder="Message...">
      <button id="sendBtn">Send</button>
    </div>
  </div>

</div>

<script>
const el = id => document.getElementById(id);

let token = null;
let ws = null;

// ---------- AUTH ----------

async function login() {
  const username = el("username").value.trim();
  const password = el("password").value.trim();

  if (!username || !password) return showError("Fill all fields");

  const res = await fetch("/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ username, password })
  });

  const data = await res.json();
  if (!res.ok) return showError(data.error);

  token = data.token;
  startChat();
}

async function register() {
  const username = el("username").value.trim();
  const password = el("password").value.trim();

  if (!username || !password) return showError("Fill all fields");

  const res = await fetch("/register", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ username, password })
  });

  const data = await res.json();
  if (!res.ok) return showError(data.error);

  showError("Registered! Now login.", "green");
}

function showError(msg, color="red") {
  const err = el("error");
  err.style.color = color;
  err.textContent = msg;
}

// ---------- CHAT ----------

function startChat() {
  el("loginView").classList.add("hidden");
  el("chatView").classList.remove("hidden");

  connectWS();
}

function connectWS() {
  ws = new WebSocket(`ws://${location.host}`);

  ws.onopen = () => {
    ws.send(JSON.stringify({ type: "auth", token }));
  };

  ws.onmessage = e => {
    const msg = JSON.parse(e.data);

    if (msg.type === "history") {
      el("messages").innerHTML = "";
      msg.messages.forEach(addMessage);
    }

    if (msg.type === "chat") addMessage(msg);
    if (msg.type === "system") addMessage(msg, true);
  };

  ws.onclose = () => {
    setTimeout(connectWS, 2000);
  };
}

function addMessage(msg, system=false) {
  const div = document.createElement("div");

  if (system) {
    div.textContent = msg.text;
    div.className = "system";
  } else {
    div.textContent = `${msg.username}: ${msg.text}`;
  }

  const box = el("messages");
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function sendMessage() {
  const input = el("messageInput");
  const text = input.value.trim();

  if (!text || !ws || ws.readyState !== 1) return;

  ws.send(JSON.stringify({ type: "chat", text }));
  input.value = "";
}

function joinRoom() {
  const room = el("roomInput").value.trim();
  if (!room) return;

  ws.send(JSON.stringify({ type: "join_room", room }));
}

// ---------- EVENTS ----------

el("loginBtn").onclick = login;
el("registerBtn").onclick = register;
el("sendBtn").onclick = sendMessage;
el("joinBtn").onclick = joinRoom;

el("messageInput").addEventListener("keypress", e => {
  if (e.key === "Enter") sendMessage();
});

</script>
</body>
</html>
